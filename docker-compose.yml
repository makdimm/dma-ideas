services:
  bot:
    build:
      context: https://github.com/makdimm/dma-ideas.git
    container_name: dma-ideas
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_ID=7653823001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ideas_data:/app/data

volumes:
  ideas_data:
